.dropdown {

    <script>
        const header = document.querySelector('header');
        let lastScrollY = window.scrollY;

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            if (currentScrollY > lastScrollY && currentScrollY > 80) {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
            }
            lastScrollY = currentScrollY;
        });

        // --- PAGE TRANSITION LOGIC ---
const overlay = document.createElement('div');
overlay.classList.add('page-transition-overlay');
document.body.appendChild(overlay);

// 1. Handle arriving on the page (and hitting the 'Back' button)
window.addEventListener('pageshow', () => {
    overlay.classList.remove('active');
    overlay.classList.add('entering');
    setTimeout(() => {
        overlay.classList.remove('entering');
    }, 350); // Matches the CSS 0.35s duration
});

// 2. Handle clicking links to leave the page
document.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', function(e) {
        if (!this.href) return;
        
        // Ignore email, phone, and open-in-new-tab links
        if (this.href.startsWith('mailto:') || this.href.startsWith('tel:') || this.target === '_blank') return;

        try {
            const targetUrl = new URL(this.href);
            const currentUrl = new URL(window.location.href);

            // Only trigger if navigating to a DIFFERENT page (ignores same-page # anchors)
            if (targetUrl.pathname !== currentUrl.pathname) {
                e.preventDefault(); // Pause the browser's instant navigation
                overlay.classList.remove('entering');
                overlay.classList.add('active'); // Trigger the green wipe
                
                // Wait for the animation to cover the screen, then navigate
                setTimeout(() => {
                    window.location.href = this.href;
                }, 350);
            }
        } catch (err) {
            // Failsafe for any weird URL formats
            console.error("URL parsing error:", err);
        }
    });
});
    </script>
